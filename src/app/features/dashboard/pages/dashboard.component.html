<div class="sidebar">

    <h4 class="title">Ferretería OTTO</h4>

    <ul class="nav nav-pills flex-column mb-auto">
        @for (item of menu; track item.label) {

        @if (item.dropdown) {
        <li>
            <a class="nav-link text-white d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
                href="#submenu{{item.label}}" role="button" aria-expanded="false">
                {{item.label}}
                <span>▼</span>
            </a>

            <div class="collapse" id="submenu{{item.label}}">
                <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
                    @for (child of item.child; track child.label) {
                    <li>
                        <a [routerLink]="child.route" class="nav-link text-white ps-4">
                            {{child.label}}
                        </a>
                    </li>
                    }
                </ul>
            </div>
        </li>
        } @else {
        <li>
            <a class="nav-link text-white d-flex" [routerLink]="item.route" routerLinkActive="active">
                {{ item.label }}
            </a>
        </li>
        }
        }
    </ul>

</div>
