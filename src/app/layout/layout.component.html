<div class="flex h-screen overflow-hidden">

    <div class="w-18rem p-3 bg-gray-900 text-white menu flex flex-column justify-content-between">
        <div>
            <div class="flex flex-column mb-3">
                <h3 class="mb-2">FERRETERÍA OTTO</h3>
                <span class="text-sm block">Sistema de gestión</span>
            </div>

            <div class="card flex justify-center border-top-1 border-gray-700 pt-3">
                <p-panelmenu [model]="items" class="w-full md:w-80" />
            </div>
        </div>

        <div class="mt-4 border-top-1 border-gray-700 pt-3 flex flex-column gap-2">
            <span class="text-sm">
                Bienvenido(a), {{ usuario.nombre }}
            </span>
            <p-button label="Cerrar sesión" icon="pi pi-sign-out" severity="danger" class="w-full"
                (onClick)="logout()"></p-button>
        </div>
    </div>

    <div class="flex-1 p-4 bg-gray-200 content">
        <router-outlet></router-outlet>
    </div>
</div>

<p-toast />
<p-confirmdialog />
