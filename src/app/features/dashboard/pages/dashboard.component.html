<div class="sidebar">

    <h4 class="title">Ferretería</h4>

    <ul class="nav nav-pills flex-column mb-auto">
        @for (item of menu; track item.label) {
        <li class="nav-item">
            <a class="nav-link" [routerLink]="item.route" routerLinkActive="active">
                <svg class="bi me-2">
                    <use [attr.xlink:href]="'#' + item.icon"></use>
                </svg>

                {{ item.label }}
            </a>
        </li>
        }
    </ul>

</div>
